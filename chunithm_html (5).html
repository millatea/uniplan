function getRange(r){
  const s=[17.50,17.25,17.00,16.75,16.50,16.25,16.00,15.75,15.50,15.25,14.50,13.25,12.00,10.00,7.00,4.00,0.00];
  for(let i=0;i<s.length-1;i++)if(r>=s[i+1]&&r<s[i])return{from:s[i+1],to:s[i]};
  if(r>=s[0])return{from:s[0],to:s[0]+0.25};
  return{from:0,to:s[s.length-2]};
}
function calcR(score,c){
  if(!score||score<900000)return 0;
  if(score>=1009000)return c+2.15;
  if(score>=1007500)return c+2.00+(score-1007500)/100*0.01;
  if(score>=1005000)return c+1.50+(score-1005000)/50*0.01;
  if(score>=1000000)return c+1.00+(score-1000000)/100*0.01;
  if(score>=990000)return c+0.60+(score-990000)/250*0.01;
  if(score>=975000)return c+(score-975000)/250*0.01;
  if(score>=950000)return c-1.67+(score-950000)/150*0.01;
  if(score>=925000)return c-3.34+(score-925000)/150*0.01;
  return c-5.00+(score-900000)/150*0.01;
}
function getRank(s){
  if(!s)return"-";
  if(s>=1009000)return"SSS+";if(s>=1007500)return"SSS";
  if(s>=1005000)return"SS+";if(s>=1000000)return"SS";
  if(s>=990000)return"S+";if(s>=975000)return"S";
  if(s>=950000)return"AAA";if(s>=925000)return"AA";
  if(s>=900000)return"A";return"-";
}
function calcBest(songs){
  const rs=songs.filter(s=>s.score>0).map(s=>calcR(s.score,s.c)).sort((a,b)=>b-a).slice(0,30);
  return rs.length?rs.reduce((a,b)=>a+b,0)/rs.length:0;
}
function fmt(s){return s?s.toString().replace(/\B(?=(\d{3})+(?!\d))/g,","):"-";}
function getDK(d=new Date()){const x=new Date(d);if(x.getHours()<5)x.setDate(x.getDate()-1);return x.toISOString().slice(0,10);}

function getRec(songs,dk){
  const top30=[...songs].filter(s=>s.score>0).map(s=>({...s,r:calcR(s.score,s.c)})).sort((a,b)=>b.r-a.r).slice(0,30);
  const diffs=[{label:"쉬움",range:[16,30]},{label:"보통",range:[11,15]},{label:"조금 어려움",range:[6,10]},{label:"어려움",range:[1,5]}];
  const tgts=[1000000,1001000,1002000,1003000,1004000,1005000,1005500,1006000,1006500,1007000,1007500,1007600,1007800,1008000,1008500,1009000,1009500,1010000];
  const used=new Set();
  const seed=dk.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  return diffs.map((d,di)=>{
    const sub=top30.slice(d.range[0]-1,d.range[1]);
    if(!sub.length)return null;
    const thr=sub.reduce((a,b)=>a+b.r,0)/sub.length;
    const cands=songs.filter(s=>!used.has(s.id)).map(s=>{
      for(const t of tgts.filter(t=>t>(s.score||0))){const nr=calcR(t,s.c);if(nr>=thr-0.02&&nr<=thr+0.08)return{...s,targetScore:t,targetRating:nr,gain:nr-calcR(s.score,s.c)};}
      return null;
    }).filter(Boolean).sort((a,b)=>Math.abs(a.targetRating-thr)-Math.abs(b.targetRating-thr));
    const pick=cands[(seed+di*7)%Math.max(1,cands.length)]||cands[0]||null;
    if(pick)used.add(pick.id);
    return{label:d.label,color:DC[d.label],thr,song:pick};
  }).filter(Boolean);
}
function sortedSongs(songs,rec){
  const ids=new Set((rec||[]).map(r=>r?.song?.id).filter(Boolean));
  return[...songs].sort((a,b)=>{
    if(a.fav!==b.fav)return a.fav?-1:1;
    if(ids.has(a.id)!==ids.has(b.id))return ids.has(a.id)?-1:1;
    return a.c-b.c;
  });
}

const Cd=({children,style,C})=><div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,...style}}>{children}</div>;
const Bx=({rank,C,RC,size=13})=>{

  const dk=getDK(d);

  const dc=checklist[dk]||[];
  const done=dc.filter(c=>c.checked).length;
  const pct=dc.length?Math.round(done/dc.length*100):0;
  const bestR=calcBest(songs);
  const tRange=getRange(bestR);
  const tk=getDK();
  useEffect(()=>{
    if(!recCache[tk]){const rec=getRec(songs,tk);const up={...recCache,[tk]:rec};setRecCache(up);LS.set("rc",up);}
  },[]);
  const rec=recCache[dk]||[];
  const sorted=sortedSongs(songs,rec);

    if(!selSong&&!note)return;
    const song=selSong?songs.find(s=>s.id===Number(selSong)):null;

    const up={...checklist,[dk]:[...(checklist[dk]||[]),ni]};setChecklist(up);LS.set("cl",up);

        <div style={{display:"flex",alignItems:"flex-end",gap:10}}>

          <span style={{fontSize:12,opacity:0.8,marginBottom:4}}>→ {tRange.to.toFixed(2)}</span>
        </div>
        <div style={{marginTop:10,background:"rgba(255,255,255,0.3)",borderRadius:99,height:6}}>

      </Cd>
      <div>

          <div><p style={{margin:0,fontSize:14,fontWeight:700,color:C.white}}>체크리스트</p>{dc.length>0&&<p style={{margin:0,fontSize:11,color:C.muted}}>{done}/{dc.length} 완료 · {pct}%</p>}</div>

            {selSong&&goalScore&&<p style={{margin:"0 0 6px",fontSize:11,color:C.purple}}>목표 레이팅: {calcR(Number(goalScore),songs.find(s=>s.id===Number(selSong))?.c||0).toFixed(4)}</p>}
            <button onClick={addCheck} style={{width:"100%",background:`linear-gradient(135deg,${C.purple},${C.purpleL})`,color:"#fff",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>추가</button>

function SongListTab({songs,setSongs,C,RC}){
  const[filter,setFilter]=useState("전체");
  const[sortKey,setSortKey]=useState("상수");
  const[sortAsc,setSortAsc]=useState(true);
  const[search,setSearch]=useState("");
  const tog=id=>{const ns=songs.map(s=>s.id===id?{...s,fav:!s.fav}:s);setSongs(ns);LS.set("songs",ns);};
  const handleSort=k=>{if(sortKey===k)setSortAsc(v=>!v);else{setSortKey(k);setSortAsc(k==="상수");}};
  let list=[...songs];
  if(search)list=list.filter(s=>s.title.toLowerCase().includes(search.toLowerCase()));
  if(filter==="즐겨찾기")list=list.filter(s=>s.fav);
  else if(filter==="미플레이")list=list.filter(s=>!s.score);
  else if(filter!=="전체")list=list.filter(s=>getRank(s.score)===filter);
  list.sort((a,b)=>{
    let v=sortKey==="레이팅"?calcR(a.score,a.c)-calcR(b.score,b.c):sortKey==="점수"?a.score-b.score:a.c-b.c;
    return sortAsc?v:-v;
  });
  return(
    <div style={{padding:"0 16px 80px"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="곡 검색..." style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1.5px solid ${C.border}`,background:C.inputBg,color:C.white,fontSize:13,outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:8,paddingBottom:4}}>
        {["전체","즐겨찾기","미플레이","SS","SS+","SSS","SSS+"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{flexShrink:0,background:filter===f?`linear-gradient(135deg,${C.purple},${C.purpleL})`:C.card2,color:filter===f?"#fff":C.muted,border:`1px solid ${filter===f?C.purple:C.border}`,borderRadius:99,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{f}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {["상수","레이팅","점수"].map(k=>(
          <button key={k} onClick={()=>handleSort(k)} style={{flex:1,background:sortKey===k?C.card2:"transparent",color:sortKey===k?C.purple:C.muted,border:`1px solid ${sortKey===k?C.border:"transparent"}`,borderRadius:8,padding:"5px",fontSize:11,cursor:"pointer"}}>
            {k}{sortKey===k?(sortAsc?"↑":"↓"):""}
          </button>
        ))}
      </div>
      <p style={{margin:"0 0 8px",fontSize:12,color:C.muted}}>{list.length}곡</p>
      {list.map(s=>{
        const r=calcR(s.score,s.c);const rank=getRank(s.score);
        return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px",borderRadius:10,marginBottom:5,background:C.card2,border:`1px solid ${C.border}`}}>
            <button onClick={()=>tog(s.id)} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:0,flexShrink:0,color:s.fav?C.gold:C.muted}}>★</button>
            <div style={{flex:1,minWidth:0}}>
              <p style={{margin:"0 0 2px",fontSize:13,fontWeight:600,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p>
              <p style={{margin:0,fontSize:11,color:C.muted}}>상수 {s.c} · {s.score?fmt(s.score):"미플레이"}</p>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <Bx rank={rank} size={12} C={C} RC={RC}/>
              {r>0&&<p style={{margin:"2px 0 0",fontSize:11,color:C.purple,fontWeight:700}}>{r.toFixed(4)}</p>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

      setMsgs(m=>[...m,{role:"assistant",text,id:mid,planItems:planItems.length>0?planItems:null}]);

    },600);

        <div><p style={{margin:"0 0 2px",fontSize:16,fontWeight:800,color:C.purple}}>Uni</p><p style={{margin:0,fontSize:12,color:C.muted}}>너라면 할 수 있어~! 준비됐어? 🎵</p></div>

      <div style={{margin:"0 16px 8px",border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>

      <div style={{flex:1,overflowY:"auto",padding:"0 16px 8px"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10}}>
            {m.role==="assistant"&&<div style={{marginRight:8,alignSelf:"flex-end"}}><UniIcon size={32} imgSrc={uniImg}/></div>}
            <div style={{maxWidth:"78%",display:"flex",flexDirection:"column",gap:6,alignItems:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{background:m.role==="user"?`linear-gradient(135deg,${C.purple},${C.purpleL})`:C.card2,color:m.role==="user"?"#fff":C.white,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.6,border:m.role==="assistant"?`1px solid ${C.border}`:"none",whiteSpace:"pre-wrap"}}>{m.text}</div>
              {m.role==="assistant"&&m.planItems?.length>0&&(
                <button onClick={()=>save(m)} disabled={savedIds.has(m.id)} style={{background:savedIds.has(m.id)?C.card2:`linear-gradient(135deg,#059669,${C.mint})`,color:savedIds.has(m.id)?C.muted:"#fff",border:"none",borderRadius:99,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:savedIds.has(m.id)?"default":"pointer"}}>
                  {savedIds.has(m.id)?"✓ 저장됨":"📋 계획 기록하기"}
                </button>
              )}
            </div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:10}}><UniIcon size={32} imgSrc={uniImg}/><div style={{background:C.card2,borderRadius:"18px 18px 18px 4px",padding:"10px 16px",border:`1px solid ${C.border}`}}><span style={{color:C.purple,fontSize:20,letterSpacing:4}}>···</span></div></div>}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"0 16px 8px",display:"flex",gap:6,overflowX:"auto"}}>
        {["오늘 연습 계획 짜줘","레이팅 올리는 법","쉬운 목표 알려줘"].map(q=>(
          <button key={q} onClick={()=>setInput(q)} style={{flexShrink:0,background:`${C.purple}22`,color:C.purple,border:`1px solid ${C.purple}55`,borderRadius:99,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>{q}</button>
        ))}

function StatsTab({songs,C,RC,recCache}){
  const played=songs.filter(s=>s.score>0);
  const bestR=calcBest(songs);
  const top30=[...played].sort((a,b)=>calcR(b.score,b.c)-calcR(a.score,a.c)).slice(0,30);
  const rankDist=["SSS+","SSS","SS+","SS","S+","S"].map(r=>({rank:r,count:songs.filter(s=>getRank(s.score)===r).length,color:RC[r]}));
  const rec=recCache[getDK()]||[];
  return(
    <div style={{padding:"0 16px 80px",display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{label:"Best Rating",value:bestR.toFixed(4),icon:"⭐",color:C.purple},{label:"플레이한 곡",value:`${played.length}곡`,icon:"🎵",color:C.mint},{label:"SSS 이상",value:`${songs.filter(s=>["SSS","SSS+"].includes(getRank(s.score))).length}곡`,icon:"🏆",color:C.gold},{label:"즐겨찾기",value:`${songs.filter(s=>s.fav).length}곡`,icon:"★",color:C.pink}].map(c=>(
          <Cd key={c.label} C={C}><p style={{margin:"0 0 4px",fontSize:20}}>{c.icon}</p><p style={{margin:"0 0 2px",fontSize:18,fontWeight:800,color:c.color}}>{c.value}</p><p style={{margin:0,fontSize:11,color:C.muted}}>{c.label}</p></Cd>
        ))}
      </div>
      <Cd C={C}><p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:C.white}}>랭크 분포</p>
        {rankDist.map(r=>(
          <div key={r.rank} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><Bx rank={r.rank} size={12} C={C} RC={RC}/><span style={{fontSize:12,color:C.muted}}>{r.count}곡</span></div>
            <div style={{background:C.border,borderRadius:99,height:6}}><div style={{background:RC[r.rank],borderRadius:99,height:6,width:`${(r.count/Math.max(songs.length,1))*100}%`}}/></div>
          </div>
        ))}
      </Cd>
      <Cd C={C}><p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.white}}>📈 오늘의 난이도별 추천</p>
        {rec.map(d=>d.song&&(
          <div key={d.label} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,marginBottom:6,background:`${d.color}18`,border:`1px solid ${d.color}44`}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:d.color,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}><span style={{fontSize:11,fontWeight:700,color:d.color}}>{d.label} · </span><span style={{fontSize:12,color:C.white}}>{d.song.title}</span><p style={{margin:0,fontSize:10,color:C.muted}}>상수 {d.song.c} · {fmt(d.song.score)} → {fmt(d.song.targetScore)}</p></div>
            <div style={{textAlign:"right"}}><p style={{margin:0,fontSize:12,fontWeight:700,color:d.color}}>{d.song.targetRating.toFixed(4)}</p><p style={{margin:0,fontSize:10,color:C.mint}}>+{d.song.gain.toFixed(4)}</p></div>
          </div>
        ))}
      </Cd>
      <Cd C={C}><p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.white}}>🏅 Best 30</p>
        {top30.map((s,i)=>(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:11,color:i<3?C.gold:C.muted,width:20,fontWeight:700}}>{i+1}</span>
            <div style={{flex:1,minWidth:0}}><p style={{margin:0,fontSize:12,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p><p style={{margin:0,fontSize:10,color:C.muted}}>상수{s.c} · {fmt(s.score)}</p></div>
            <div style={{textAlign:"right"}}><Bx rank={getRank(s.score)} size={11} C={C} RC={RC}/><p style={{margin:0,fontSize:11,color:C.purple,fontWeight:700}}>{calcR(s.score,s.c).toFixed(4)}</p></div>
          </div>
        ))}
      </Cd>
    </div>
  );
}

  const[nickInput,setNickInput]=useState(nickname);
  const fileRef=useRef(null);
  const bestR=calcBest(songs);
  const title=getTitle(bestR);
  const tRange=getRange(bestR);
  const topSongs=[...songs].filter(s=>s.score>0).sort((a,b)=>calcR(b.score,b.c)-calcR(a.score,a.c)).slice(0,5);

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSub("main")} style={{background:"none",border:"none",color:C.purple,fontSize:20,cursor:"pointer"}}>‹</button>
        <p style={{margin:0,fontSize:16,fontWeight:700,color:C.white}}>★ 즐겨찾기 ({favSongs.length})</p>

        :favSongs.map(s=>{const r=calcR(s.score,s.c);return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px",borderRadius:10,marginBottom:5,background:C.card2,border:`1px solid ${C.border}`}}>
            <button onClick={()=>{const ns=songs.map(x=>x.id===s.id?{...x,fav:false}:x);setSongs(ns);LS.set("songs",ns);}} style={{background:"none",border:"none",color:C.gold,fontSize:16,cursor:"pointer",padding:0}}>★</button>
            <div style={{flex:1,minWidth:0}}><p style={{margin:"0 0 2px",fontSize:13,fontWeight:600,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p><p style={{margin:0,fontSize:11,color:C.muted}}>상수 {s.c} · {fmt(s.score)}</p></div>
            <div style={{textAlign:"right"}}><Bx rank={getRank(s.score)} size={12} C={C} RC={RC}/>{r>0&&<p style={{margin:"2px 0 0",fontSize:11,color:C.purple}}>{r.toFixed(4)}</p>}</div>

        );})}

        <p style={{margin:0,fontSize:16,fontWeight:700,color:C.white}}>📝 점수 갱신</p>
      </div>
      {editSong?(
        <Cd C={C}>
          <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:C.white}}>{editSong.title}</p>
          <p style={{margin:"0 0 12px",fontSize:12,color:C.muted}}>상수 {editSong.c} · 현재: {fmt(editSong.score)}</p>
          <input type="number" placeholder="새 점수 입력" value={newScore} onChange={e=>setNewScore(e.target.value)} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,background:C.inputBg,color:C.white,fontSize:14,outline:"none",marginBottom:8,boxSizing:"border-box"}}/>

              <p style={{margin:0,fontSize:13,fontWeight:700,color:C.purple}}>새 레이팅: {calcR(Number(newScore),editSong.c).toFixed(4)}</p>
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setEditSong(null);setNewScore("");}} style={{flex:1,background:C.card2,color:C.muted,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px",fontSize:13,cursor:"pointer"}}>취소</button>
            <button onClick={saveScore} style={{flex:2,background:`linear-gradient(135deg,${C.purple},${C.purpleL})`,color:"#fff",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>저장</button>

              {s.fav&&<span style={{color:C.gold,fontSize:13}}>★</span>}
              <div style={{flex:1,minWidth:0}}><p style={{margin:"0 0 2px",fontSize:13,color:C.white,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p><p style={{margin:0,fontSize:11,color:C.muted}}>상수 {s.c} · {s.score?fmt(s.score):"미플레이"}</p></div>

      )}

    <div style={{padding:"0 16px 80px"}}>
      <div style={{background:`linear-gradient(135deg,${C.purple}22,${C.purpleL}11)`,borderRadius:20,padding:20,marginBottom:14,border:`1px solid ${C.purple}33`}}>
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:14}}>
          <div style={{position:"relative"}}>
            <UniIcon size={60} imgSrc={uniImg}/>
            <button onClick={()=>fileRef.current?.click()} style={{position:"absolute",bottom:-2,right:-2,width:22,height:22,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.purpleL})`,border:"2px solid "+C.bg,color:"#fff",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✏️</button>

              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:6}}>

                <button onClick={()=>{setEditNick(true);setNickInput(nickname);}} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0}}>✏️</button>
              </div>
            )}
            <p style={{margin:0,fontSize:12,color:C.muted}}>Best Rating {bestR.toFixed(4)}</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:C.muted}}>{tRange.from.toFixed(2)}</span>

          <span style={{fontSize:11,color:C.muted}}>{tRange.to.toFixed(2)}</span>

      {[{icon:"★",label:"즐겨찾는 곡",badge:`${favSongs.length}곡`,action:()=>setSub("fav")},{icon:"📝",label:"점수 갱신",action:()=>setSub("update")},{icon:"🎨",label:"테마 변경",badge:C.name,action:()=>{const nt=theme==="dark"?"light":"dark";setTheme(nt);LS.set("theme",nt);}},{icon:"🖼️",label:"코치 아이콘 변경",action:()=>fileRef.current?.click()},].map((item,i)=>(
        <div key={i} onClick={item.action} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>

          {item.badge&&<span style={{fontSize:11,color:C.purple,fontWeight:700}}>{item.badge}</span>}
          <span style={{color:C.muted,fontSize:16}}>›</span>
        </div>
      ))}
      <p style={{margin:"14px 0 8px",fontSize:13,fontWeight:700,color:C.white}}>🏅 레이팅 Top 5</p>
      {topSongs.map((s,i)=>(
        <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:10,marginBottom:5,background:C.card2,border:`1px solid ${C.border}`}}>

        </div>
      ))}
    </div>
  );
}

function App(){
  const[tab,setTab]=useState("home");
  const[songs,setSongs]=useState(()=>LS.get("songs",SD));
  const[checklist,setChecklist]=useState(()=>LS.get("cl",{}));
  const[uniImg,setUniImg]=useState(()=>LS.get("uniImg",null));
  const[theme,setTheme]=useState(()=>LS.get("theme","dark"));
  const[nickname,setNickname]=useState(()=>LS.get("nick","MilK+TEA"));
  const[recCache,setRecCache]=useState(()=>LS.get("rc",{}));
  const C=TH[theme];
  const RC=theme==="dark"?RCD:RCL;

  useEffect(()=>{
    const tk=getDK();
    if(!recCache[tk]){const rec=getRec(songs,tk);const up={...recCache,[tk]:rec};setRecCache(up);LS.set("rc",up);}
  },[]);

  const addPlan=items=>{
    const today=new Date().toISOString().slice(0,10);
    const ni=items.map((label,i)=>({id:Date.now()+i,label,songId:null,goalScore:null,checked:false}));
    const up={...checklist,[today]:[...(checklist[today]||[]),...ni]};
    setChecklist(up);LS.set("cl",up);setTab("home");
  };

  const tabs=[{id:"home",icon:"🏠",label:"홈"},{id:"songs",icon:"🎵",label:"곡 목록"},{id:"ai",uni:true,label:"Uni"},{id:"stats",icon:"📊",label:"통계"},{id:"my",icon:"👤",label:"마이"}];

  return(
    <div style={{width:"100vw",height:"100dvh",display:"flex",justifyContent:"center",alignItems:"center",background:"#000"}}>
      <div style={{width:"min(100vw, calc(100dvh * 9/16))",height:"100dvh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"'Segoe UI',sans-serif",color:C.text,overflow:"hidden"}}>
        <div style={{background:TH[theme].card,padding:"14px 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.purple},${C.pink})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👑</div>
            <div>
              <p style={{margin:0,fontSize:16,fontWeight:900,background:`linear-gradient(135deg,${C.purple},${C.purpleL})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CHUNITHM</p>
              <p style={{margin:0,fontSize:10,color:C.muted,letterSpacing:1}}>PLANNER</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,fontSize:13,color:C.white,fontWeight:700}}>Best {calcBest(songs).toFixed(4)}</p>
              <p style={{margin:0,fontSize:11,color:C.muted}}>→ {getRange(calcBest(songs)).to.toFixed(2)}</p>
            </div>
            <button onClick={()=>{
              const html=document.documentElement.outerHTML;
              const blob=new Blob([html],{type:"text/html"});
              const a=document.createElement("a");
              a.href=URL.createObjectURL(blob);
              a.download="CHUNITHM_Planner.html";
              a.click();
            }} title="HTML로 저장" style={{background:`linear-gradient(135deg,${C.purple},${C.purpleL})`,border:"none",borderRadius:8,color:"#fff",fontSize:16,cursor:"pointer",padding:"6px 8px",lineHeight:1}}>⬇️</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",paddingTop:14}}>
          {tab==="home"&&<HomeTab songs={songs} C={C} RC={RC} checklist={checklist} setChecklist={setChecklist} uniImg={uniImg} recCache={recCache} setRecCache={setRecCache}/>}
          {tab==="songs"&&<SongListTab songs={songs} setSongs={setSongs} C={C} RC={RC}/>}
          {tab==="ai"&&<AITab songs={songs} onAddPlan={addPlan} C={C} uniImg={uniImg} recCache={recCache}/>}
          {tab==="stats"&&<StatsTab songs={songs} C={C} RC={RC} recCache={recCache}/>}
          {tab==="my"&&<MyTab songs={songs} setSongs={setSongs} C={C} RC={RC} uniImg={uniImg} setUniImg={setUniImg} theme={theme} setTheme={setTheme} nickname={nickname} setNickname={setNickname} recCache={recCache}/>}
        </div>
        <div style={{background:TH[theme].card,display:"flex",borderTop:`1px solid ${C.border}`,padding:"8px 0 12px",flexShrink:0}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
              {t.uni?<UniIcon size={tab===t.id?28:24} imgSrc={uniImg}/>:<span style={{fontSize:20,opacity:tab===t.id?1:0.5}}>{t.icon}</span>}
              <span style={{fontSize:10,fontWeight:tab===t.id?700:400,color:tab===t.id?C.purple:C.muted}}>{t.label}</span>
              {tab===t.id&&<div style={{width:16,height:2,background:C.purple,borderRadius:99}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
